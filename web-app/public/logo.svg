  <line x1="125" y1="120" x2="148" y2="115" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="125" y1="120" x2="148" y2="130" stroke="#2ec4a0" stroke-width="2.5"/>
  
  <line x1="98" y1="142" x2="118" y2="142" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="118" y1="142" x2="135" y2="148" stroke="#2ec4a0" stroke-width="2.5"/>
  
  <!-- Circuit nodes -->
  <circle cx="120" cy="58" r="3.5" fill="#2ec4a0"/>
  <circle cx="135" cy="48" r="3" fill="#2ec4a0"/>
  <circle cx="140" cy="65" r="3" fill="#2ec4a0"/>

  <circle cx="145" cy="90" r="3" fill="#2ec4a0"/>
  <circle cx="130" cy="100" r="3.5" fill="#2ec4a0"/>
  <circle cx="152" cy="95" r="3" fill="#2ec4a0"/>
  <circle cx="152" cy="108" r="3" fill="#2ec4a0"/>
  <circle cx="125" cy="120" r="3.5" fill="#2ec4a0"/>
  <circle cx="148" cy="115" r="3" fill="#2ec4a0"/>
  <circle cx="148" cy="130" r="3" fill="#2ec4a0"/>
  <circle cx="118" cy="142" r="3.5" fill="#2ec4a0"/>

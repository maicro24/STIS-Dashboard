<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Black circle background -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e"/>
  
  <!-- Traffic light body -->
  <rect x="62" y="38" width="36" height="124" rx="18" fill="#4a4a5a"/>
  
  <!-- Traffic light arms/brackets - left -->
  <rect x="38" y="55" width="24" height="6" rx="3" fill="#6a6a7a"/>
  <rect x="38" y="97" width="24" height="6" rx="3" fill="#6a6a7a"/>
  <rect x="38" y="139" width="24" height="6" rx="3" fill="#6a6a7a"/>
  
  <!-- Red light -->

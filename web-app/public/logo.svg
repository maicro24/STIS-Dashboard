  <line x1="98" y1="58" x2="120" y2="58" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="120" y1="58" x2="135" y2="48" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="120" y1="58" x2="140" y2="65" stroke="#2ec4a0" stroke-width="2.5"/>
  
  <line x1="98" y1="80" x2="125" y2="80" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="125" y1="80" x2="148" y2="75" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="125" y1="80" x2="145" y2="90" stroke="#2ec4a0" stroke-width="2.5"/>
  
  <line x1="98" y1="100" x2="130" y2="100" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="130" y1="100" x2="152" y2="95" stroke="#2ec4a0" stroke-width="2.5"/>
  <line x1="130" y1="100" x2="152" y2="108" stroke="#2ec4a0" stroke-width="2.5"/>
  
